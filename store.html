<!DOCTYPE html><html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>מוצרים קטנים להדפסה - Bambulab A1</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #111;
      color: #fff;
      text-align: center;
    }header {
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
  background-color: #222;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background-color: #1c1c1c;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  transition: transform 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.product-name {
  margin-top: 10px;
  font-size: 18px;
  font-weight: bold;
}

.price {
  color: #4CAF50;
  font-size: 16px;
  margin-top: 5px;
}

  </style>
</head>
<body><header>
  מוצרים קטנים להדפסה במדפסת Bambulab A1
</header><section class="gallery">  <div class="card">
    <img src="https://via.placeholder.com/300x200" alt="מחזיק מפתחות">
    <div class="product-name">מחזיק מפתחות מעוצב</div>
    <div class="price">₪15</div>
  </div>  <div class="card">
    <img src="https://via.placeholder.com/300x200" alt="מעמד לטלפון">
    <div class="product-name">מעמד לטלפון</div>
    <div class="price">₪25</div>
  </div>  <div class="card">
    <img src="https://via.placeholder.com/300x200" alt="קופסה קטנה">
    <div class="product-name">קופסת אחסון קטנה</div>
    <div class="price">₪20</div>
  </div>  <div class="card">
    <img src="https://via.placeholder.com/300x200" alt="קליפס לכבלים">
    <div class="product-name">קליפס לניהול כבלים</div>
    <div class="price">₪10</div>
  </div>  <div class="card">
    <img src="https://via.placeholder.com/300x200" alt="מעמד לאוזניות">
    <div class="product-name">מעמד לאוזניות</div>
    <div class="price">₪30</div>
  </div></section></body>
</html>
